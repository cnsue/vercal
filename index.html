<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>养老金工具页</title>
  <style>
    :root {
      --bg: #f5f1eb;
      --card: rgba(255, 255, 255, 0.9);
      --text: #2f241d;
      --muted: #6f6156;
      --accent: #9b2d20;
      --line: rgba(47, 36, 29, 0.12);
      --shadow: 0 18px 40px rgba(109, 76, 48, 0.12);
      --font: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px 16px 48px;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(195, 62, 47, 0.08), transparent 30%),
        linear-gradient(180deg, #fbf7f2 0%, var(--bg) 100%);
    }

    .page {
      width: min(1040px, 100%);
      margin: 0 auto;
    }

    .hero {
      padding: 28px;
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .card {
      display: grid;
      gap: 14px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .card h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    a.button:hover {
      transform: translateY(-1px);
    }

    a.button.primary {
      background: linear-gradient(135deg, var(--accent), #ca5744);
      color: #fff;
      box-shadow: 0 12px 24px rgba(155, 45, 32, 0.18);
    }

    a.button.secondary {
      background: rgba(47, 36, 29, 0.06);
      color: var(--text);
    }

    .route {
      font-size: 13px;
      color: var(--muted);
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .card {
        padding: 18px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>养老金工具页</h1>
      <p>这里收纳当前可公开访问的两个静态页面。部署到 Vercel 后，访问根域名即可进入本页，再选择对应工具。</p>
    </section>

    <section class="grid">
      <article class="card">
        <div class="eyebrow">Tool 01</div>
        <h2>退休待遇与养老缺口测算</h2>
        <p>按社保养老金口径估算退休待遇，并把退休支出目标、其他稳定收入和自有养老储备需求拆开看。</p>
        <div class="route">路由：`/retirement-gap-calculator`</div>
        <div class="links">
          <a class="button primary" href="./retirement-gap-calculator.html">打开页面</a>
        </div>
      </article>

      <article class="card">
        <div class="eyebrow">Tool 02</div>
        <h2>银行股养老全收益计算器</h2>
        <p>这是你新增的独立 HTML 页面，保留原始结构，可作为第二个外部公开访问的工具页。</p>
        <div class="route">路由：`/pension-calc-v5`</div>
        <div class="links">
          <a class="button primary" href="./pension-calc-v5.html">打开页面</a>
        </div>
      </article>
    </section>
  </div>
</body>
</html>
